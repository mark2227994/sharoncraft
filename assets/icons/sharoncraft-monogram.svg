<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle -->
  <circle cx="60" cy="60" r="56" stroke="#D4A574" stroke-width="2" fill="none"/>
  
  <!-- Inner Circle -->
  <circle cx="60" cy="60" r="48" stroke="#D4A574" stroke-width="1.5" fill="none"/>
  
  <!-- Beaded Ring Detail -->
  <circle cx="60" cy="14" r="3.5" fill="#D4A574"/>
  <circle cx="60" cy="106" r="3.5" fill="#D4A574"/>
  <circle cx="14" cy="60" r="3.5" fill="#D4A574"/>
  <circle cx="106" cy="60" r="3.5" fill="#D4A574"/>
  <circle cx="29" cy="29" r="3.5" fill="#C49464"/>
  <circle cx="91" cy="91" r="3.5" fill="#C49464"/>
  <circle cx="91" cy="29" r="3.5" fill="#F2C94C"/>
  <circle cx="29" cy="91" r="3.5" fill="#1ABC9C"/>
  
  <!-- "S" using Geometric Patterns -->
  <g>
    <!-- S Left Curve - Triangles -->
    <polygon points="38,35 45,35 41.5,42" fill="#D4A574" opacity="0.9"/>
    <polygon points="35,50 40,50 37.5,57" fill="#D4A574" opacity="0.9"/>
    <polygon points="38,70 45,70 41.5,77" fill="#D4A574" opacity="0.9"/>
    <polygon points="35,85 40,85 37.5,92" fill="#D4A574" opacity="0.9"/>
    
    <!-- S Connecting Elements -->
    <path d="M 42 42 Q 38 55 40 70" stroke="#C49464" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- "C" using Geometric Patterns -->
  <g>
    <!-- C Right Curve - Triangles -->
    <polygon points="82,35 75,35 78.5,42" fill="#D4A574" opacity="0.9"/>
    <polygon points="85,50 80,50 82.5,57" fill="#D4A574" opacity="0.9"/>
    <polygon points="82,70 75,70 78.5,77" fill="#D4A574" opacity="0.9"/>
    <polygon points="85,85 80,85 82.5,92" fill="#D4A574" opacity="0.9"/>
    
    <!-- C Connecting Elements -->
    <path d="M 78 42 Q 82 55 80 70" stroke="#C49464" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Center Bead Accent -->
  <circle cx="60" cy="60" r="6" fill="#C49464"/>
  <circle cx="60" cy="60" r="4" fill="#D4A574"/>
  
  <!-- Small Maasai Diamond Patterns around center -->
  <polygon points="60,45 67,52 60,59 53,52" fill="#1ABC9C" opacity="0.7"/>
  <polygon points="60,75 67,68 74,75 67,82" fill="#F2C94C" opacity="0.6"/>
  <polygon points="45,60 52,53 59,60 52,67" fill="#F2C94C" opacity="0.6"/>
  <polygon points="75,60 82,53 89,60 82,67" fill="#1ABC9C" opacity="0.7"/>
</svg>
