      place-items: center;
      padding: 1.25rem;
    }
    .share-card {
      width: min(100%, 34rem);
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(92, 64, 51, 0.12);
      border: 1px solid rgba(92, 64, 51, 0.08);
    }
    .share-card img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 3.1;
      object-fit: cover;
    }
    .share-copy {
      padding: 1.2rem;
      display: grid;
      gap: 0.8rem;
    }
    .share-kicker {
      color: #d96c48;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
      font-weight: 800;
    }
    .share-copy h1 {
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.2;
      font-family: "Poppins", system-ui, sans-serif;
    }
    .share-copy p {
      margin: 0;
      line-height: 1.65;
    }
    .share-copy a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0.85rem 1rem;
      border-radius: 999px;
      background: #d96c48;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      width: fit-content;
    }
  </style>
</head>
