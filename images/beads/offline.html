<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SharonCraft | Offline</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0a09;
      color: #f6f1ea;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      max-width: 420px;
      padding: 28px;
      border-radius: 18px;
      background: #191613;
      border: 1px solid rgba(240, 180, 76, 0.2);
      text-align: center;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
    }
    p {
      margin: 0 0 18px;
      color: #b9b1a7;
    }
    a {
      color: #f0b44c;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>SharonCraft needs a connection to load the latest collection.</p>
    <a href="index.html">Try again</a>
  </div>
</body>
</html>
