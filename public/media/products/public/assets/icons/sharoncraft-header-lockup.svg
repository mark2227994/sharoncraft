<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" role="img" aria-labelledby="title">
  <title>SharonCraft Brand Lockup</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&display=swap');
      .logo-mark { fill: #C04D29; }
      .brand-name { font-family: Georgia, serif; font-size: 56px; font-weight: 700; fill: #1a1a1a; letter-spacing: -1px; }
      .brand-accent { fill: #C04D29; height: 3px; }
