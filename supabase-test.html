<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supabase Test</title>
</head>
<body>
  <h1>Supabase Integration Test</h1>
  <div id="status">Testing...</div>
  <div id="products"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js" defer></script>
  <script src="supabase-catalog.js" defer></script>
  <script>
    async function testSupabase() {
      const status = document.getElementById('status');
      const productsDiv = document.getElementById('products');

      try {
        // Wait for scripts to load
        await new Promise(resolve => setTimeout(resolve, 1000));

        if (!window.SharonCraftCatalog) {
          status.textContent = '❌ SharonCraftCatalog not loaded';
          return;
        }

        const isConfigured = window.SharonCraftCatalog.isConfigured();
        status.textContent = isConfigured ? '✅ Supabase is configured' : '❌ Supabase not configured';

        if (isConfigured) {
          const products = await window.SharonCraftCatalog.fetchProducts();
          productsDiv.innerHTML = `<h2>Products (${products.length}):</h2>` +
            products.map(p => `<div>${p.name} - ${p.price} KES</div>`).join('');
        }
      } catch (error) {
        status.textContent = `❌ Error: ${error.message}`;
        console.error(error);
      }
    }

    testSupabase();
  </script>
</body>
